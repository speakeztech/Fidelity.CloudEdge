name: Regenerate Bindings

on:
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to run'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - runtime
          - management
      active_only:
        description: 'Only process active services'
        required: false
        default: true
        type: boolean

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          sudo apt-get install -y jq

      - name: Install Hawaii
        run: dotnet tool install -g hawaii

      - name: Install Glutinum CLI
        run: npm install -g @glutinum/cli

      - name: Download OpenAPI spec
        run: |
          mkdir -p generators/hawaii/temp
          curl -sL "https://raw.githubusercontent.com/cloudflare/api-schemas/main/openapi.json" \
            -o generators/hawaii/temp/openapi.json
          echo "Spec size: $(du -h generators/hawaii/temp/openapi.json | cut -f1)"

      - name: Generate runtime bindings
        if: ${{ github.event.inputs.pipeline != 'management' }}
        run: bash generators/scripts/generate-runtime.sh

      - name: Generate management bindings
        if: ${{ github.event.inputs.pipeline != 'runtime' }}
        run: |
          FLAGS=""
          if [[ "${{ github.event.inputs.active_only }}" == "true" ]]; then
            FLAGS="--active-only"
          fi
          bash generators/scripts/generate-management.sh $FLAGS --skip-build

      - name: Validate
        run: bash generators/scripts/validate.sh --active-only --skip-build

      - name: Build solution
        run: dotnet build Fidelity.CloudEdge.sln -c Release

      - name: Run tests
        run: dotnet test Fidelity.CloudEdge.sln -c Release --no-build --verbosity normal

      - name: Check for changes
        id: changes
        run: |
          git diff --stat
          if [[ -n "$(git status --porcelain src/)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: regenerate Cloudflare bindings'
          title: 'chore: regenerate Cloudflare bindings'
          body: |
            Automated regeneration of Cloudflare bindings from latest OpenAPI spec and workers-types.

            **Pipeline:** ${{ github.event.inputs.pipeline || 'both' }}
            **Trigger:** ${{ github.event_name }}

            ## Changes
            - Updated runtime bindings (Glutinum)
            - Updated management bindings (Hawaii)
            - All services compiled and tests passed

            ---
            _Generated by the [regenerate-bindings](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow._
          branch: chore/regenerate-bindings
          delete-branch: true
          labels: |
            automated
            bindings
